name: Continuous Integration

on:
  push:
    branches:
      - "*"
    tags-ignore:
      - "*"

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Annotate commit with clippy warnings
        uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Test
        run: cargo test
